<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
    height:100vh;

    background:
        radial-gradient(circle at 20% 20%, rgba(255,0,76,0.25), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(255,94,126,0.2), transparent 40%),
        linear-gradient(135deg,#0a0a0a,#1a0000,#000);

    background-size: 200% 200%;
    animation: bgMove 10s ease infinite;

    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* card */
.card{
    width:340px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
    overflow:hidden;
}

/* header */
.header{text-align:center;padding:20px;}

.profile{
    width:90px;height:90px;border-radius:50%;
    border:2px solid #ff004c;
}

.live{
    display:inline-block;
    background:red;
    padding:4px 10px;
    border-radius:20px;
    font-size:11px;
    margin-top:8px;
    animation:pulse 1.2s infinite;
}

/* viewer */
.viewer{
    font-size:12px;
    margin-top:5px;
    opacity:0.8;
}

/* menu */
.menu{display:flex;background:rgba(255,255,255,0.08);}
.menu div{
    flex:1;text-align:center;padding:10px;cursor:pointer;font-size:13px;
}
.active{background:#ff004c;}

/* content */
.content{padding:20px;}

/* chat */
.chat{display:flex;flex-direction:column;gap:10px;}
.msg{
    background:rgba(255,255,255,0.08);
    padding:10px;border-radius:10px;
    max-width:75%;
    opacity:0;
    animation:fadeIn 0.5s forwards;
}

/* video */
.video-box{display:none;}

.video{
    height:180px;
    background:url('https://res.cloudinary.com/dmt7xvozi/image/upload/v1778937978/xmefkfzorcw3lhnqdnoy.jpg') center/cover;
    border-radius:15px;
    position:relative;
}

.video::after{
    content:'';position:absolute;inset:0;
    background:rgba(0,0,0,0.4);
}

.play{
    position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);
    background:#ff004c;width:60px;height:60px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
}

.video-text{
    margin-top:10px;text-align:center;font-size:13px;
}

/* button */
.btn{
    position:relative;
    display:block;
    margin-top:15px;
    padding:14px;
    border-radius:50px;
    background:linear-gradient(90deg,#ff004c,#ff5e7e);
    text-align:center;
    color:white;
    text-decoration:none;
    font-weight:600;
    overflow:hidden;

    box-shadow:0 0 15px rgba(255,0,76,0.6),
               0 0 30px rgba(255,0,76,0.4);

    animation:pulseBtn 1.5s infinite;
    transition:0.2s;
}

/* shimmer effect */
.btn::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
    );
    animation:shine 2s infinite;
}

/* klik effect */
.btn:active{
    transform:scale(0.95);
}

/* pulse */
@keyframes pulseBtn{
    0%{transform:scale(1);}
    50%{transform:scale(1.07);}
    100%{transform:scale(1);}
}

/* shimmer anim */
@keyframes shine{
    0%{left:-100%;}
    100%{left:100%;}
}

/* typing */
.typing{margin-top:10px;font-size:13px;opacity:0.7;}

/* notif */
.notif{
    position:fixed;bottom:20px;left:50%;
    transform:translateX(-50%);
    background:rgba(0,0,0,0.7);
    padding:10px 15px;border-radius:10px;
    font-size:12px;opacity:0;
    animation:showNotif 6s infinite;
}

/* countdown */
.count{font-size:12px;margin-top:5px;opacity:0.7;}

/* animations */
@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

@keyframes showNotif{
    0%{opacity:0;transform:translate(-50%,20px);}
    10%{opacity:1;}
    80%{opacity:1;}
    100%{opacity:0;transform:translate(-50%,20px);}
}
</style>

<body>

<div class="card">

<!-- HEADER -->
<div class="header">
    <img src="https://res.cloudinary.com/dmt7xvozi/image/upload/v1778936529/mqybbkpr3yvl9wn0utx4.jpg" class="profile">
    <div class="live">LIVE 🔴</div>
    <div class="viewer" id="viewer">👀 1856 people watching</div>
</div>

<!-- MENU -->
<div class="menu">
    <div id="chatTab" class="active">Live Streaming🔥🔥</div>
    <div id="videoTab">Private Exclusive Video💦💦</div>
</div>

<!-- CONTENT -->
<div class="content">

    <!-- CHAT -->
    <div class="chat" id="chat"></div>

    <!-- VIDEO -->
    <div class="video-box" id="videoBox">
        <div class="video" onclick="goWA()">
            <div class="play">▶</div>
        </div>
        <div class="video-text">Tap to watch full video</div>
    </div>

    <div class="typing" id="typing">typing...</div>

    <div class="count">
        Redirect in <span id="time">15</span>s
    </div>

    <a href="https://hggagb.lnkks.com/p/2C8Oz" class="btn">
        Click For Free Access
    </a>

</div>

</div>

<!-- NOTIF -->
<div class="notif" id="notif">Someone unlocked 🔓</div>

<script>
// chat flow
const chat = document.getElementById("chat");
const messages=[
    "Hey… I’ve been waiting 😈",
    "Do you want to see my live stream...🍆💦"
];

messages.forEach((text,i)=>{
    setTimeout(()=>{
        let msg=document.createElement("div");
        msg.className="msg";
        msg.innerText=text;
        chat.appendChild(msg);
    },i*1500);
});

// tab
chatTab.onclick=()=>{
    chat.style.display="flex";
    videoBox.style.display="none";
};
videoTab.onclick=()=>{
    chat.style.display="none";
    videoBox.style.display="block";
};

// typing
const typingText=["typing...","waiting..."];
let i=0;
setInterval(()=>{
    document.getElementById("typing").innerText=typingText[i];
    i=(i+1)%typingText.length;
},2000);

// viewer counter
let viewers=1856;
setInterval(()=>{
    viewers+=Math.floor(Math.random()*21) - 10;
    if(viewers<1500)viewers=1500;
    if(viewers>1900)viewers=1900;
    document.getElementById("viewer").innerText=
        "👀 "+viewers+" people watching";
},3000);

// notif
const names=["Alex","John","Mike","Chris","Daniel"];
setInterval(()=>{
    let name=names[Math.floor(Math.random()*names.length)];
    document.getElementById("notif").innerText=
        name+" unlocked 🔓";
},6000);

// countdown
let t=15;
setInterval(()=>{
    t--;
    document.getElementById("time").innerText=t;
    if(t<=0) goWA();
},1000);

// redirect
function goWA(){
    window.location.href="https://hggagb.lnkks.com/p/2C8Oz";
}
</script>
